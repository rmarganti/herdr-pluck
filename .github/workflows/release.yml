name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all -- -D warnings

  build:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Zig
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo install cargo-zigbuild --locked

      - name: Build binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package archive
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="herdr-pluck-v${VERSION}-${TARGET}.tar.gz"
          mkdir -p dist
          cp "target/${TARGET}/release/herdr-pluck" dist/
          tar -czf "$ARCHIVE" -C dist herdr-pluck
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            herdr-pluck-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            herdr-pluck-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
